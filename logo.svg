<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="68" y2="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Signal mark -->
  <polyline points="0,40 18,40 28,10 38,70 48,40 72,40"
    stroke="url(#g)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
    fill="none" filter="url(#glow)"/>
  <circle cx="28" cy="10" r="5.5" fill="#38bdf8" filter="url(#glow)"/>
  <!-- Separator -->
  <line x1="92" y1="18" x2="92" y2="62" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
  <!-- Wordmark -->
  <text x="108" y="56"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-2">no</text>
  <text x="178" y="56"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="44" font-weight="200" fill="rgba(255,255,255,.4)" letter-spacing="-1.5">web</text>
</svg>
